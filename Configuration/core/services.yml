---
title: Services and Drivers
description: Configures services and drivers to reduce background system resource utilization
onUpgrade: false
actions:
  - !powerShell:
    command: |
      .\BACKUP.ps1 -FilePath """$([Environment]::GetFolderPath('Windows'))\chenniXModules\Other\winServices.reg"""
    wait: true
    exeDir: true

  - !writeStatus: {status: '禁用文件共享'}
  - !powerShell:
    command: '.\chenniXModules\Scripts\ScriptWrappers\DisableFileSharing.ps1 -Silent'
    exeDir: true
    wait: true
    runas: currentUserElevated

  - !writeStatus: {status: '配置搜索索引'}
  - !cmd:
    command: '"chenniXDesktop\2.系统配置\配置\搜索索引\Minimal Search Indexing (default).cmd" /silent'
    exeDir: true
    wait: true
    runas: currentUserElevated

  - !writeStatus: {status: '配置服务'}
  - !service: {name: 'OneSyncSvc', operation: change, startup: 4, option: 'disable-setting-sync'}
  - !service: {name: 'TrkWks', operation: change, startup: 4}
  - !service: {name: 'UCPD', operation: change, startup: 4}
  - !powerShell:
    command: |
      $key = 'HKLM\SYSTEM\CurrentControlSet\Control\Class\{71a27cdd-812a-11d0-bec7-08002be2092f}'
      $val = (Get-ItemProperty -Path "Registry::$key" -Name 'LowerFilters' -ErrorAction SilentlyContinue).LowerFilters
      if ($val) {
        $val = $val | Where-Object { $_ -ne 'rdyboost' }
        Set-ItemProperty -Path "Registry::$key" -Name 'LowerFilters' -Value $val -Type MultiString
      }
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'disable-sysmain'
  - !service: {name: 'rdyboost', operation: change, startup: 4, option: 'disable-sysmain'}
  - !registryKey: {path: 'HKCR\Drive\shellex\PropertySheetHandlers\{55B3A0BD-4D28-42fe-8CFB-FA3EDFF969B8}', operation: delete, option: 'disable-sysmain'}
  - !service: {name: 'SysMain', operation: change, startup: 4, option: 'disable-sysmain'}
  - !registryValue: {path: 'HKLM\SOFTWARE\chenniXOS\Services\SuperFetch', value: 'state', data: '0', type: REG_DWORD, option: 'disable-sysmain'}

  - !writeStatus: {status: '禁用位置服务'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\location', value: 'Value', data: '0', type: REG_SZ}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\location', value: 'Value', data: '0', type: REG_SZ}

  - !writeStatus: {status: '配置驱动'}
  - !service: {name: 'GpuEnergyDrv', operation: change, startup: 4}
  - !service: {name: 'NetBT', operation: change, startup: 4}
  - !service: {name: 'RetailDemo', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'MapsBroker', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'CSC', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'WdiServiceHost', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'WdiSystemHost', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'troubleshootingsvc', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'wercplsupport', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'dps', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'GraphicsPerfSvc', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'Ndu', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'dusmsvc', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'DSSvc', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'wisvc', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'dam', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'MSDTC', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'midisrv', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'TermService', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'UmRdpService', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'SessionEnv', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'bttflt', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'gencounter', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'hyperkbd', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'hypervideo', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'vmgid', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'vpci', operation: change, startup: 4, option: 'ultralow-latency'}
  - !service: {name: 'vid', operation: change, startup: 4, option: 'ultralow-latency'}
