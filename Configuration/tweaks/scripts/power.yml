---
title: Power Configuration
description: Configures power settings
actions:
  - !writeStatus: {status: '配置电源计划'}

  - !powerShell:
    command: |
      if (!(powercfg /l | Select-String "GUID: 11111111-1111-1111-1111-111111111111" -Quiet)) {
          powercfg /duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61 11111111-1111-1111-1111-111111111111 > $null
      }
      powercfg /changename 11111111-1111-1111-1111-111111111111 "chenniX Power Scheme" "Power scheme optimized for optimal latency and performance."
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 0012ee47-9041-4b5d-9b77-535fba8b1442 d3d55efd-c1ff-424e-9dc3-441be7833010 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 0012ee47-9041-4b5d-9b77-535fba8b1442 d639518a-e56d-4345-8af2-b9f32fb26109 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 0012ee47-9041-4b5d-9b77-535fba8b1442 fc7372b6-ab2d-43ee-8797-15e9841f2cca 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 2a737441-1930-4402-8d77-b2bebba308a3 0853a681-27c8-4100-a2fd-82013e970683 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 2a737441-1930-4402-8d77-b2bebba308a3 d4e98f31-5ffe-4ce1-be31-1b38b384c009 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 54533251-82be-4824-96c1-47b60b740d00 3b04d4fd-1cc7-4f23-ab1c-d1337819c4bb 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 7516b95f-f776-4464-8c53-06167f40cc99 17aaa29b-8b43-4b94-aafe-35f64daaf1ee 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 7516b95f-f776-4464-8c53-06167f40cc99 3c0bc021-c8a8-4e07-a973-6b14cbcb2b7e 0
      powercfg /setacvalueindex 11111111-1111-1111-1111-111111111111 54533251-82be-4824-96c1-47b60b740d00 4d2b0152-7d5c-498b-88e2-34345392a2c5 200
      powercfg /setactive "381b4222-f694-4f3a-b7cc-48f93f8f13e6"
    wait: true
    exeDir: true
    runas: currentUserElevated

  - !run: {exe: 'powercfg.exe', args: '/setacvalueindex "381b4222-f694-4f3a-b7cc-48f93f8f13e6" 0012ee47-9041-4b5d-9b77-535fba8b1442 d3d55efd-c1ff-424e-9dc3-441be7833010 0'}
  - !run: {exe: 'powercfg.exe', args: '/setacvalueindex "381b4222-f694-4f3a-b7cc-48f93f8f13e6" 0012ee47-9041-4b5d-9b77-535fba8b1442 d639518a-e56d-4345-8af2-b9f32fb26109 0'}
  - !run: {exe: 'powercfg.exe', args: '/setacvalueindex "381b4222-f694-4f3a-b7cc-48f93f8f13e6" 0012ee47-9041-4b5d-9b77-535fba8b1442 fc7372b6-ab2d-43ee-8797-15e9841f2cca 0'}
  - !run: {exe: 'powercfg.exe', args: '/setacvalueindex "381b4222-f694-4f3a-b7cc-48f93f8f13e6" 2a737441-1930-4402-8d77-b2bebba308a3 0853a681-27c8-4100-a2fd-82013e970683 0'}
  - !run: {exe: 'powercfg.exe', args: '/setacvalueindex "381b4222-f694-4f3a-b7cc-48f93f8f13e6" 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 0'}
  - !run: {exe: 'powercfg.exe', args: '/setacvalueindex "381b4222-f694-4f3a-b7cc-48f93f8f13e6" 2a737441-1930-4402-8d77-b2bebba308a3 d4e98f31-5ffe-4ce1-be31-1b38b384c009 0'}
  - !run: {exe: 'powercfg.exe', args: '/setactive "381b4222-f694-4f3a-b7cc-48f93f8f13e6"'}

  - !powerShell:
    command: |
      $windir = [Environment]::GetFolderPath('Windows')
      & "$windir\chenniXModules\Scripts\toggleDev.cmd" -Disable '@("ACPI Processor Aggregator", "Microsoft Windows Management Interface for ACPI")' | Out-Null
    wait: true
    exeDir: true
    runas: currentUserElevated

  - !powerShell:
    command: |
      $properties = Get-NetAdapter -Physical | Get-NetAdapterAdvancedProperty
      foreach ($setting in @("ULPMode", "EEE", "EEELinkAdvertisement", "AdvancedEEE", "EnableGreenEthernet", "EeePhyEnable", "uAPSDSupport", "EnablePowerManagement", "EnableSavePowerNow", "bLowPowerEnable", "PowerSaveMode", "PowerSavingMode", "SavePowerNowEnabled", "AutoPowerSaveModeEnabled", "NicAutoPowerSaver", "SelectiveSuspend")) {
          $properties | Where-Object { $_.RegistryKeyword -eq "*$setting" -or $_.RegistryKeyword -eq $setting } | Set-NetAdapterAdvancedProperty -RegistryValue 0
      }
    wait: true
    exeDir: true
    runas: currentUserElevated

  - !powerShell:
    command: |
      $keys = Get-ChildItem -Path "HKLM:\SYSTEM\CurrentControlSet\Enum" -Recurse -EA 0
      foreach ($value in @("AllowIdleIrpInD3", "D3ColdSupported", "DeviceSelectiveSuspended", "EnableIdlePowerManagement", "EnableSelectiveSuspend", "EnhancedPowerManagementEnabled", "IdleInWorkingState", "SelectiveSuspendEnabled", "SelectiveSuspendOn", "WaitWakeEnabled", "WakeEnabled", "WdfDirectedPowerTransitionEnable")) {
          $keys | Where-Object { $_.GetValueNames() -contains $value } | ForEach-Object {
              $keyPath = $_.PSPath
              $oldValue = "$value-OLD"
              if ($null -eq (Get-ItemProperty -Path $keyPath -Name $oldValue -EA 0)) {
                  Rename-ItemProperty -Path $keyPath -Name $value -NewName $oldValue -Force
              }
              Set-ItemProperty -Path $KeyPath -Name $value -Value 0 -Type DWORD -Force
          }
      }
      Get-CimInstance -ClassName MSPower_DeviceEnable -Namespace root/WMI | Set-CimInstance -Property @{ Enable = $false }
    wait: true
    exeDir: true
    runas: currentUserElevated

  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Power', value: 'HiberbootEnabled', data: '0', type: REG_DWORD}

  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Storage', value: 'StorageD3InModernStandby', data: '0', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\stornvme\Parameters\Device', value: 'IdlePowerMode', data: '0', type: REG_DWORD}

  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Power\PowerThrottling', value: 'PowerThrottlingOff', data: '1', type: REG_DWORD, option: 'disable-power-saving'}

  - !cmd:
    command: '"chenniXDesktop\2.系统配置\配置\休眠\Disable Hibernation (default).cmd" /silent'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'disable-hibernation'
