---
title: Core Isolation
description: Disables core isolation (VBS)
onUpgrade: true
actions:
  - !powerShell:
    command: '& """.\chenniXModules\Scripts\ScriptWrappers\ConfigVBS.ps1""" -DisableAllVBS'
    runas: currentUserElevated
    wait: true
    exeDir: true
    option: 'disable-core-isolation'
