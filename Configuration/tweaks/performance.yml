---
title: Performance Tweaks
description: Performance optimizations
onUpgrade: true
actions:
  - !writeStatus: {status: '运行性能优化'}

  # ============================================
  # 多媒体与调度
  # ============================================

  # 系统响应度设为10（默认20）
  # 说明: 值越小，非多媒体任务获得更多CPU时间；10为游戏优化推荐值
  # 参考: https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.Multimedia::SystemResponsiveness
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'SystemResponsiveness', data: '10', type: REG_DWORD}

  # 禁用自动文件夹类型发现
  # 说明: 修复含大量媒体文件的文件夹加载缓慢问题
  # 参考: https://www.windowslatest.com/2024/03/04/windows-11-can-open-big-folders-in-file-explorer-faster-if-you-turn-off-folder-discovery/
  - !powerShell:
    command: '& """$([Environment]::GetFolderPath(''Windows''))\chenniXDesktop\2.系统配置\界面\文件资源管理器\自动文件夹发现\Disable Automatic Folder Discovery (default).cmd""" /silent'
    runas: currentUserElevated
    wait: true
    exeDir: true

  # ============================================
  # 后台与维护
  # ============================================

  # 禁用计划维护唤醒（阻止系统从睡眠中唤醒执行维护）
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Task Scheduler\Maintenance', value: 'WakeUp', data: '0', type: REG_DWORD}

  # 全局禁用后台应用
  # ⚠️ 部分UWP应用可能无法在后台接收通知/更新
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\BackgroundAccessApplications', value: 'GlobalUserDisabled', data: '1', type: REG_DWORD}

  # 禁用搜索的后台应用全局开关
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'BackgroundAppGlobalToggle', data: '0', type: REG_DWORD}

  # ============================================
  # 容错堆（Fault Tolerant Heap）
  # ============================================

  # 禁用容错堆（FTH）- 调用Sysprep特殊化先重置FTH状态
  # 说明: FTH会在应用崩溃时自动应用缓解措施，但可能导致性能问题
  # ⚠️ 仅影响AMD64架构
  - !run: {exe: 'rundll32.exe', args: 'fthsvc.dll,FthSysprepSpecialize', weight: 5, cpuArch: 'X64'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\FTH', value: 'Enabled', data: '0', type: REG_DWORD, cpuArch: 'X64'}

  # ============================================
  # 诊断日志与电源效率
  # ============================================

  # 禁用睡眠研究/内核处理器电源/用户模式电源服务的诊断日志
  - !run: {exe: 'wevtutil.exe', args: 'set-log "Microsoft-Windows-SleepStudy/Diagnostic" /e:false'}
  - !run: {exe: 'wevtutil.exe', args: 'set-log "Microsoft-Windows-Kernel-Processor-Power/Diagnostic" /e:false'}
  - !run: {exe: 'wevtutil.exe', args: 'set-log "Microsoft-Windows-UserModePowerService/Diagnostic" /e:false'}

  # 禁用电源效率诊断计划任务
  - !scheduledTask: {path: '\Microsoft\Windows\Power Efficiency Diagnostics\AnalyzeSystem', operation: disable}

  # 搜索索引尊重电源模式（低功耗时减少索引活动）
  - !registryValue: {path: 'HKLM\Software\Microsoft\Windows Search\Gather\Windows\SystemIndex', value: 'RespectPowerModes', data: '1', type: REG_DWORD}

  # ============================================
  # 文件系统
  # ============================================

  # 禁用最后访问时间戳更新（减少磁盘写入，提升性能）
  # 说明: 等同于 fsutil behavior set disablelastaccess 1
  - !run: {exe: 'fsutil.exe', args: 'behavior set disablelastaccess 1'}

  # 禁用8.3短文件名（减少磁盘写入和目录枚举开销）
  - !run: {exe: 'fsutil.exe', args: '8dot3name set 1'}

  # ============================================
  # 服务宿主分组（SvcHostSplitDisable）
  # ============================================

  # 批量设置所有服务的 SvcHostSplitDisable=1
  # 说明: 将共享svchost进程的服务拆分为独立进程，提高可靠性和安全性
  # ⚠️ 会增加内存占用（每个服务独立进程）；跳过所有Xbox相关服务以避免Xbox登录问题
  - !powerShell:
    command: |
      $skip = @('XblAuthManager','XblGameSave','XblNetApiHost','XblNetApiProxy','XboxGip','XboxGipSvc','XboxIdnet','XboxLive','XboxNetApiSvc')
      Get-Item -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\*' | Where-Object { $_.GetValue('Start') -ne $null -and $skip -notcontains $_.PSChildName } | ForEach-Object {
          New-ItemProperty -Path $_.PSPath -Name 'SvcHostSplitDisable' -Value 1 -PropertyType DWord -Force
      }
    wait: true
    runas: currentUserElevated

  # ============================================
  # Win32优先级分离（Win32PrioritySeparation）
  # ============================================

  # 值26(0x1A): 前台短时量程+中优先级
  # 说明: 给前台应用更多CPU时间，适合游戏/桌面场景
  # 参考: https://learn.microsoft.com/en-us/windows/win32/procthread/scheduling-priorities
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl', value: 'Win32PrioritySeparation', data: '26', type: REG_DWORD, option: 'win32-priority-26'}

  # 值38(0x26): 前台长时量程+中优先级
  # 说明: 前台应用获得更长时间片，适合工作站/渲染场景
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl', value: 'Win32PrioritySeparation', data: '38', type: REG_DWORD, option: 'win32-priority-38'}

  # 值2: 前台短时量程+高优先级
  # 说明: Windows服务器默认值，前台应用最高优先级但时间片短
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl', value: 'Win32PrioritySeparation', data: '2', type: REG_DWORD, option: 'win32-priority-2'}

  # ============================================
  # 无条件优化项（从超级低延迟移出的隐私/体验/优化项）
  # 这些项不激进，不勾选超级低延迟也应执行
  # ============================================

  # --- 输入隐私 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\InputPersonalization', value: 'RestrictImplicitInkCollection', data: '1', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\InputPersonalization', value: 'RestrictImplicitTextCollection', data: '1', type: REG_DWORD}

  # --- Cortana/云搜索禁用 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search', value: 'AllowCortana', data: '0', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search', value: 'AllowCloudSearch', data: '0', type: REG_DWORD}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'CortanaConsent', data: '0', type: REG_DWORD}

  # --- 视觉/桌面体验优化 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'DesktopLivePreviewHoverTime', data: '250', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'ThumbnailLivePreviewHoverTime', data: '250', type: REG_DWORD}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Clipboard', value: 'CloudClipboardAutomaticUpload', data: '0', type: REG_DWORD}

  # --- 网络隐私 ---
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\BFE\Parameters\Policy\Options', value: 'CollectNetEvents', data: '0', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\Dhcp\Parameters', value: 'PdcActivationDisabled', data: '1', type: REG_DWORD}

  # --- 内核优化 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System', value: 'CopyFileBufferedSynchronousIo', data: '1', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\EventSystem', value: 'ParallelFiringTimeoutEnabled', data: '1', type: REG_DWORD}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager', value: 'ComServerShutdownDelayMs', data: '1000', type: REG_DWORD}

  # ============================================
  # 超级低延迟（ultralow-latency）
  # 勾选后自动执行全部低延迟优化项
  # ⚠️ 牺牲安全性/节能换取最低延迟
  # ============================================

  # --- 0. MMCSS 后台 CPU 份额降为 0 ---
  # SystemResponsiveness 默认 20%（为后台任务预留 CPU 时间），设为 0 可最大化前台游戏 CPU 占用
  # ⚠️ 可能影响后台音频/视频流畅度
  # 参考: https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.Multimedia::SystemResponsiveness
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'SystemResponsiveness', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 1. MPO 禁用 ---
  # 禁用 Multi-Plane Overlay，解决 NVIDIA/AMD 显卡微卡顿、闪烁、黑屏
  # 集显用户可能出现不稳定
  # 参考: https://github.com/RedDot-3ND7355/MPO-GPU-FIX
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm', value: 'OverlayTestMode', data: '5', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 2. GPU TDR 延迟延长 ---
  # 超时检测延迟从默认2秒延长到12秒，防止高负载游戏 TDR 崩溃
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers', value: 'TdrDelay', data: '12', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 3. MSI 模式启用 ---
  # 为 PCI 设备启用 Message Signaled Interrupts，中断延迟更低
  - !powerShell:
    command: |
      $pciDevices = Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Enum\*\*\*' -ErrorAction SilentlyContinue |
        Where-Object { $_.Class -eq 'Display' -or $_.Class -eq 'Net' -or $_.Class -eq 'SCSIAdapter' -or $_.Class -eq 'IDEController' }
      foreach ($dev in $pciDevices) {
        $path = $dev.PSPath
        if (Test-Path $path) {
          New-ItemProperty -Path $path -Name 'DevicePriority' -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
        }
      }
      $controllers = @('HKLM:\SYSTEM\CurrentControlSet\Enum\PCI\*\*', 'HKLM:\SYSTEM\CurrentControlSet\Enum\ACPI\*\*')
      foreach ($ctrlPath in $controllers) {
        Get-Item $ctrlPath -ErrorAction SilentlyContinue | ForEach-Object {
          New-ItemProperty -Path $_.PSPath -Name 'MSISupported' -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
        }
      }
    wait: true
    runas: currentUserElevated
    option: 'ultralow-latency'

  # --- 4. HPET 移除 ---
  # 删除高精度事件定时器（HPET）的平台时钟和平台节拍
  # HPET 是已知延迟源，移除后系统回退到 TSC/invariant TSC
  - !cmd:
    command: 'bcdedit /deletevalue useplatformclock'
    wait: true
    option: 'ultralow-latency'
  - !cmd:
    command: 'bcdedit /deletevalue useplatformtick'
    wait: true
    option: 'ultralow-latency'
  - !cmd:
    command: 'bcdedit /set disabledynamictick yes'
    wait: true
    option: 'ultralow-latency'

  # --- 5. Nagle 算法禁用 ---
  # 对所有 TCP 接口禁用 Nagle 算法，网络响应更快
  - !powerShell:
    command: |
      $adapters = Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces\*' -ErrorAction SilentlyContinue
      foreach ($adapter in $adapters) {
        $path = $adapter.PSPath
        New-ItemProperty -Path $path -Name 'TcpAckFrequency' -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
        New-ItemProperty -Path $path -Name 'TCPNoDelay' -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
      }
    wait: true
    runas: currentUserElevated
    option: 'ultralow-latency'

  # --- 6. 禁用页面合并 ---
  # 减少内存合并操作带来的延迟
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management', value: 'DisablePageCombining', data: '1', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 7. 禁用定时器聚合 ---
  # 定时器聚合会合并多个定时器到期，增加延迟
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\kernel', value: 'GlobalTimerCoalescing', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\kernel', value: 'CoalescingTimerInterval', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 8. 多媒体调度优化 ---
  # 禁用懒模式：让多媒体调度更积极
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'NoLazyMode', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  # 网络节流指数最大化：前台多媒体进程网络不限速
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'NetworkThrottlingIndex', data: '4294967295', type: REG_DWORD, option: 'ultralow-latency'}
  # 定时器分辨率：注册表层静态默认值，与 SetTimerResolution.exe 运行时覆盖互补
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'TimerResolution', data: '10', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 9. VBS/HVCI 禁用 ---
  # 与核心隔离选项幂等共存，两者都写同一注册表值，先后执行结果相同
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity', value: 'Enabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard', value: 'EnableVirtualizationBasedSecurity', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 10. DMA 重映射禁用 ---
  # 减少 IOMMU 开销，降低设备访问内存延迟
  # ⚠️ 禁用后 Thunderbolt/USB4 外部设备可直读内存
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard\Scenarios\SecureBoot', value: 'Enabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 11. WINEVT 通道全量禁用 ---
  - !powerShell:
    command: |
      Get-ChildItem 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WINEVT\Channels' -ErrorAction SilentlyContinue | ForEach-Object {
        if ($_.GetValue('Enabled') -eq 1) {
          Set-ItemProperty -Path $_.PSPath -Name 'Enabled' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        }
      }
    wait: true
    runas: currentUserElevated
    option: 'ultralow-latency'

  # --- 12. 内核/调度高级注册表 ---
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager', value: 'BackgroundLoadKnownDlls', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager', value: 'BootExecuteNoPnpSync', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager', value: 'TaskhostTimeout', data: '2000', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows', value: 'DesktopHeapLogging', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows', value: 'TimerCoalescing', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'DelayedDesktopSwitchTimeout', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'RunLogonScriptSync', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'RunStartupScriptSync', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Power', value: 'SleepStudyDisabled', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa', value: 'TokenLeakDetectDelaySecs', data: '30', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Audio', value: 'AudioHealthMonitorLimit', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\BrokerInfrastructure\Parameters', value: 'DefaultTriggerCoalescingTime', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\BrokerInfrastructure\Parameters', value: 'DisableTriggerCoalescing', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\SCMConfig', value: 'EnableSvchostMitigationPolicy', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\SCMConfig', value: 'EnableSvchostMitigationsPolicy', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 13. 输入优化 HKLM 层 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Input', value: 'IsInputAppPreloadEnabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Input', value: 'BluebirdDTWMultiplier', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Input', value: 'DisableExpressiveInputShellHotkey', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Input', value: 'DynamicAutocorrectionAllowed', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 14. 搜索/Cortana 禁用补充 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search', value: 'DisableSearchBoxSuggestions', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'CanCortanaBeEnabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'HistoryViewEnabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'DeviceHistoryEnabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'IsDynamicSearchBoxEnabled', data: '0', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 15. 视觉效果/桌面优化 ---
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm', value: 'DisableProjectedShadows', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm', value: 'MousewheelAnimationDurationMs', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System', value: 'DisableLogonBackgroundImage', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\XAML', value: 'DisableGlobalAnimations', data: '1', type: REG_DWORD, option: 'ultralow-latency'}

  # --- 16. 网络优化补充 ---
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\Dnscache\Parameters', value: 'EnableNetbios', data: '0', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings\WinHttp', value: 'DisableWpad', data: '1', type: REG_DWORD, option: 'ultralow-latency'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient', value: 'MaxNegativeCacheTtl', data: '5', type: REG_DWORD, option: 'ultralow-latency'}
