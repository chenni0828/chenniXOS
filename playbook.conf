<Playbook>
		<Name>chenniXOS</Name>
		<Username>chenni0828</Username>
		<ShortDescription>chenniXOS Windows 11 优化 Playbook</ShortDescription>
		<Title>chenniXOS v0.2.3</Title>
		<Description><![CDATA[╭───────────── ⚠️ 重要 ⚠️ ─────────────╮
│    安装前请务必备份重要文件。      │
│    当前为测试版本（v0.2.3），     │
│    部分功能仍在验证中。           │
╰───────────────────────────────────╯

chenniXOS 通过移除不必要的后台进程、遥测和预装应用，配合大量易用性改进，让你的 Windows 更快、更隐私、更顺手。]]></Description>
		<Details>一个开放且轻量的 Windows 优化方案，旨在提升性能、隐私和易用性。支持 Windows 11 24H2/25H2，可选超级低延迟、精简组件、隐私优化等多种配置。所有优化项均可通过桌面 chenniX 文件夹随时调整。</Details>
		<ProgressText><![CDATA[chenniXOS 正在安装基础软件、复制配置文件夹并优化 Windows，请稍候...]]></ProgressText>
		<Version>0.2.3</Version>
		<UpgradableFrom>0.2</UpgradableFrom>
		<SupportedBuilds>
			<!-- 24H2 -->
			<string>26100</string>
			<!-- 25H2 -->
			<string>26200</string>
		</SupportedBuilds>
		<Requirements>
			<Requirement>DefenderToggled</Requirement>
			<Requirement>NoAntivirus</Requirement>
			<Requirement>Internet</Requirement>
			<Requirement>NoPendingUpdates</Requirement>
			<Requirement>UCPDDisabled</Requirement>
			<Requirement>PluggedIn</Requirement>
		</Requirements>
		<UniqueId>c51bcffc-4041-4325-8428-3e58d71ca8a9</UniqueId>
		<Overhaul>true</Overhaul>
		<UseKernelDriver>false</UseKernelDriver>
		<AllowUnsupportedUpgrades>false</AllowUnsupportedUpgrades>
		<ProductCode>64</ProductCode>
		<EstimatedMinutes>10</EstimatedMinutes>
		<InstallGuide>https://github.com/chenni0828/chenniXOS</InstallGuide>
		<Git>https://github.com/chenni0828/chenniXOS</Git>
		<Website>https://github.com/chenni0828/chenniXOS</Website>
		<SupportsISO>true</SupportsISO>
		<OOBE>
			<BulletPoints>
				<BulletPoint Icon="Rocket" Title="性能优化"
				Description="禁用后台遥测、计划任务和不必要的服务，可选超级低延迟模式。"/>
				<BulletPoint Icon="Lock" Title="易用性"
				Description="移除预装应用和广告，优化资源管理器、任务栏和右键菜单。"/>
				<BulletPoint Icon="Privacy" Title="隐私保护"
				Description="一键禁用遥测、活动历史、广告 ID 和所有数据收集。"/>
			</BulletPoints>
			<Internet>Force</Internet>
		</OOBE>
		<ISO>
			<DisableBitLocker>true</DisableBitLocker>
			<DisableHardwareRequirements>true</DisableHardwareRequirements>
		</ISO>
		<FeaturePages>
			<RadioPage IsRequired="true" DefaultOption="defender-enable" Description="禁用 Defender 会降低系统安全性，仅建议高级用户选择。">
				<TopLine Text="之后可在 chenniX 文件夹中切换 Defender 状态。"/>
				<Options>
					<RadioOption>
						<Text>启用 Defender（推荐）</Text>
						<Name>defender-enable</Name>
					</RadioOption>
					<RadioOption>
						<Text>禁用 Defender</Text>
						<Name>defender-disable</Name>
					</RadioOption>
				</Options>
			</RadioPage>
			<RadioPage IsRequired="true" DefaultOption="mitigations-default" Description="禁用缓解措施会降低安全性，可能损害现代 CPU 性能。">
				<TopLine Text="仅当使用旧 CPU 且追求极限性能时考虑禁用。"/>
				<Options>
					<RadioOption>
						<Text>Windows 默认缓解措施（推荐）</Text>
						<Name>mitigations-default</Name>
					</RadioOption>
					<RadioOption>
						<Text>禁用所有缓解措施</Text>
						<Name>mitigations-disable</Name>
					</RadioOption>
				</Options>
			</RadioPage>
			<RadioPage IsRequired="true" DefaultOption="auto-updates-disable" Description="自动更新对安全性很重要，但可能导致不可预期的兼容性问题。">
				<TopLine Text="之后可在 chenniX 文件夹中更改此设置。"/>
				<Options>
					<RadioOption>
						<Text>禁用自动更新</Text>
						<Name>auto-updates-disable</Name>
					</RadioOption>
					<RadioOption>
						<Text>启用自动更新</Text>
						<Name>auto-updates-default</Name>
					</RadioOption>
				</Options>
			</RadioPage>
			<CheckboxPage IsRequired="true" Description="选择要移除的组件，移除后仍可重新安装。">
				<Options>
					<CheckboxOption>
						<Text>移除 Microsoft Edge</Text>
						<Name>uninstall-edge</Name>
					</CheckboxOption>
					<CheckboxOption>
						<Text>移除 OneDrive</Text>
						<Name>uninstall-onedrive</Name>
					</CheckboxOption>
					<CheckboxOption>
						<Text>移除截图工具 (Snipping Tool)</Text>
						<Name>remove-snipping-tool</Name>
					</CheckboxOption>
				</Options>
			</CheckboxPage>
			<CheckboxPage IsRequired="true" Description="禁用 SysMain 将同时禁用 ReadyBoost，且 LastActivityView 将无法正常工作">
				<TopLine Text="选择要启用的优化选项，之后可在 chenniX 文件夹中更改。"/>
				<Options>
					<CheckboxOption>
						<Text>禁用 SysMain（预取/Superfetch，SSD 推荐禁用）</Text>
						<Name>disable-sysmain</Name>
					</CheckboxOption>
					<CheckboxOption>
						<Text>禁用休眠</Text>
						<Name>disable-hibernation</Name>
					</CheckboxOption>
				</Options>
			</CheckboxPage>
			<CheckboxPage IsRequired="true" Description="以下选项会牺牲安全性或便利性，请谨慎选择。">
				<Options>
					<CheckboxOption>
						<Text>禁用核心隔离（内存完整性）</Text>
						<Name>disable-core-isolation</Name>
					</CheckboxOption>
					<CheckboxOption>
						<Text>禁用设置同步（若需登录微软账户并同步，请勿勾选）</Text>
						<Name>disable-setting-sync</Name>
					</CheckboxOption>
					<CheckboxOption>
						<Text>win10风格上下文菜单</Text>
						<Name>old-context-menu</Name>
					</CheckboxOption>
				</Options>
			</CheckboxPage>
			<RadioPage IsRequired="true" DefaultOption="win32-priority-2" Description="前台程序的优先级分离值，影响前台与后台进程的 CPU 时间分配。">
				<TopLine Text="2为系统默认值，26和38为国外社区推荐值"/>
				<Options>
					<RadioOption>
						<Text>2（推荐）</Text>
						<Name>win32-priority-2</Name>
					</RadioOption>
					<RadioOption>
						<Text>26（对旧 CPU 满载卡顿有一定缓解）</Text>
						<Name>win32-priority-26</Name>
					</RadioOption>
					<RadioOption>
						<Text>38</Text>
						<Name>win32-priority-38</Name>
					</RadioOption>
				</Options>
			</RadioPage>
			<CheckboxPage IsRequired="true" Description="超级低延迟：勾选后自动执行全部低延迟优化，牺牲安全/节能换最低延迟，仅推荐竞技游戏玩家。集显用户需谨慎。建议同时选择「禁用缓解措施」。">
				<TopLine Text="电源与性能选项，之后可在 chenniX 文件夹中更改。"/>
				<Options>
					<CheckboxOption>
						<Text>电源限制</Text>
						<Name>disable-power-saving</Name>
					</CheckboxOption>
					<CheckboxOption>
						<Text>超级低延迟(测试版本)</Text>
						<Name>ultralow-latency</Name>
					</CheckboxOption>
				</Options>
			</CheckboxPage>
			<RadioPage IsRequired="true" DefaultOption="software-local" Description="选择基础运行时（7-Zip、VC++、DirectX）的安装来源。">
				<TopLine Text="本地模式使用内置安装包，在线模式下载最新版"/>
				<Options>
					<RadioOption>
						<Text>本地安装（推荐）</Text>
						<Name>software-local</Name>
					</RadioOption>
					<RadioOption>
						<Text>联网安装（需要github连接）</Text>
						<Name>software-online</Name>
					</RadioOption>
				</Options>
			</RadioPage>
			<RadioPage IsRequired="true" DefaultOption="disable-mouse-accel" Description="如果你不玩fps游戏，对精确操作和原生输入无要求请启用。">
				<TopLine Text="禁用鼠标加速可获得 1:1 原始输入"/>
				<Options>
					<RadioOption>
						<Text>禁用鼠标加速（推荐，FPS 玩家首选）</Text>
						<Name>disable-mouse-accel</Name>
					</RadioOption>
					<RadioOption>
						<Text>启用鼠标加速</Text>
						<Name>enable-mouse-accel</Name>
					</RadioOption>
				</Options>
			</RadioPage>
		</FeaturePages>
</Playbook>
